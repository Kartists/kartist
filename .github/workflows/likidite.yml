name: Likidite Taramasi (tek seferlik)
on:
  schedule:
    - cron: '10 1,4,7,10,13,16,19,22 * * *'   # gunde 8 kosu, gece guncellemesiyle ayni kuyrukta
  workflow_dispatch:

concurrency:
  group: kartist-tek
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  likidite:
    runs-on: ubuntu-latest
    timeout-minutes: 118
    steps:
      - uses: actions/checkout@v4

      - name: En guncel ilerlemeyi al (onceki calistirmalarin uzerine yazmamak icin)
        run: |
          git config user.name "kartist-bot"
          git config user.email "bot@kartist.com.tr"
          git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kart sayfalarindan satis hacmi topla (100 dk butce)
        run: python3 araclar/likidite_tara.py 6000

      - name: Bittiyse bu workflow'u kaldir
        run: |
          if [ -f veri/likidite/TAMAM ]; then
            git rm .github/workflows/likidite.yml
            echo "Likidite taramasi tamamlandi, workflow kaldiriliyor."
          fi

      - name: Ilerlemeyi commit et
        run: |
          git add -A
          git commit -m "likidite ilerleme: $(date -u '+%F %H:%M')" || echo "degisiklik yok"
          git fetch origin main
          git merge -X ours origin/main --no-edit -m "guncel main ile birlestir" || {
            echo "Birlestirme basarisiz oldu, bu calistirmanin cakisan kismi atlaniyor, bir sonrakinde devam edilecek."
            git merge --abort || true
          }
          git push origin main || echo "gonderim basarisiz, bir sonraki calistirmada tekrar denenecek"
